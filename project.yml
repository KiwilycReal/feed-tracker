name: FeedTracker
options:
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  FeedTrackerCorePkg:
    path: .

targets:
  FeedTracker:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: App
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kiwilyc.feedtracker
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        SWIFT_VERSION: 5.0
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - package: FeedTrackerCorePkg
        product: FeedTrackerCore

schemes:
  FeedTracker:
    build:
      targets:
        FeedTracker: all
    run:
      config: Debug
    archive:
      config: Release
