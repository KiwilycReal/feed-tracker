name: FeedTracker
options:
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  FeedTrackerCorePkg:
    path: .

targets:
  FeedTracker:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: App
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kiwilyc.feedtracker
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_CFBundleIconName: AppIcon
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight
        INFOPLIST_KEY_NSSupportsLiveActivities: YES
        SWIFT_VERSION: 5.0
        CURRENT_PROJECT_VERSION: 20260304083115
        MARKETING_VERSION: 0.2.0
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: App/FeedTracker.entitlements
    dependencies:
      - package: FeedTrackerCorePkg
        product: FeedTrackerCore
      - target: FeedTrackerLiveActivityWidgetExtension
        embed: true

  FeedTrackerLiveActivityWidgetExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: LiveActivityWidgetExtension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kiwilyc.feedtracker.LiveActivityWidgetExtension
        INFOPLIST_FILE: LiveActivityWidgetExtension/Info.plist
        SWIFT_VERSION: 5.0
        CURRENT_PROJECT_VERSION: 20260304083115
        MARKETING_VERSION: 0.2.0
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: LiveActivityWidgetExtension/FeedTrackerLiveActivityWidgetExtension.entitlements
        APPLICATION_EXTENSION_API_ONLY: YES
    dependencies:
      - package: FeedTrackerCorePkg
        product: FeedTrackerCore

schemes:
  FeedTracker:
    build:
      targets:
        FeedTracker: all
        FeedTrackerLiveActivityWidgetExtension: all
    run:
      config: Debug
    archive:
      config: Release
