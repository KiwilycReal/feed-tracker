included:
  - Sources
  - Tests

excluded:
  - .build

opt_in_rules:
  - empty_count
  - explicit_init
  - fatal_error_message
  - first_where
  - force_unwrapping
  - sorted_imports

analyzer_rules:
  - unused_import

line_length:
  warning: 140
  error: 180

type_body_length:
  warning: 300
  error: 500

file_length:
  warning: 500
  error: 800

identifier_name:
  min_length:
    warning: 2
    error: 1
  excluded:
    - id
    - x
    - y
    - i
    - j
