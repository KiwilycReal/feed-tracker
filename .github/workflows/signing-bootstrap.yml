name: signing-bootstrap

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to provision (branch/tag)
        required: false
        default: main
        type: string
      bootstrap_command:
        description: Optional lane override
        required: false
        default: bundle exec fastlane ios signing_bootstrap
        type: string

concurrency:
  group: signing-bootstrap-${{ github.event.inputs.ref || github.ref }}
  cancel-in-progress: false

jobs:
  bootstrap:
    uses: ./.github/workflows/_tool_signing_bootstrap.yml
    with:
      checkout_ref: ${{ github.event.inputs.ref || 'main' }}
      environment_name: prod
      bootstrap_command: ${{ github.event.inputs.bootstrap_command || 'bundle exec fastlane ios signing_bootstrap' }}
    secrets: inherit
