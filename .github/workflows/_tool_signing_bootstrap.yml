name: Tool - Signing Bootstrap

on:
  workflow_call:
    inputs:
      checkout_ref:
        description: Git ref to checkout
        required: false
        type: string
      environment_name:
        description: Environment name that holds bootstrap secrets
        required: false
        default: prod
        type: string
      bootstrap_command:
        description: Command used to run signing bootstrap lane
        required: false
        default: bundle exec fastlane ios signing_bootstrap
        type: string

jobs:
  signing-bootstrap:
    name: signing-bootstrap
    runs-on: macos-15
    timeout-minutes: 35
    environment: ${{ inputs.environment_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.checkout_ref || github.ref }}

      - name: Select latest Xcode available
        shell: bash
        run: |
          set -euo pipefail
          latest=""
          if compgen -G "/Applications/Xcode_*.app" > /dev/null; then
            latest=$(ls -1d /Applications/Xcode_*.app | sort -V | tail -n1)
          elif [ -d "/Applications/Xcode.app" ]; then
            latest="/Applications/Xcode.app"
          fi

          if [ -z "$latest" ]; then
            echo "::error::No Xcode installation found on runner"
            exit 1
          fi

          sudo xcode-select -s "$latest/Contents/Developer"
          xcodebuild -version

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Validate bootstrap prerequisites
        shell: bash
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          FASTLANE_SESSION: ${{ secrets.FASTLANE_SESSION }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          MATCH_GIT_URL: ${{ vars.MATCH_GIT_URL }}
        run: |
          set -euo pipefail
          required=(
            APP_STORE_CONNECT_API_KEY_ID
            APP_STORE_CONNECT_API_ISSUER_ID
            APP_STORE_CONNECT_API_KEY_BASE64
            APPLE_TEAM_ID
            APPLE_ID
            FASTLANE_SESSION
            MATCH_PASSWORD
            MATCH_GIT_BASIC_AUTHORIZATION
            KEYCHAIN_PASSWORD
            MATCH_GIT_URL
          )
          missing=()
          for key in "${required[@]}"; do
            if [ -z "${!key:-}" ]; then
              missing+=("$key")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Missing bootstrap keys: ${missing[*]}"
            exit 1
          fi

      - name: Run signing bootstrap lane
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          FASTLANE_SESSION: ${{ secrets.FASTLANE_SESSION }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          MATCH_GIT_URL: ${{ vars.MATCH_GIT_URL }}
          CI_SIGNING_CONFIG_PATH: ${{ vars.CI_SIGNING_CONFIG_PATH }}
        run: ${{ inputs.bootstrap_command }}
