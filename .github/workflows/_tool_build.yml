name: Tool - Build

on:
  workflow_call:
    inputs:
      checkout_ref:
        required: false
        type: string

jobs:
  build:
    name: swift-build-release
    runs-on: macos-14
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.checkout_ref || github.ref }}

      - name: Swift build (release)
        run: swift build -c release
