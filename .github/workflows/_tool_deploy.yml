name: Tool - Deploy TestFlight

on:
  workflow_call:
    inputs:
      checkout_ref:
        description: Git ref to checkout
        required: false
        type: string
      environment_name:
        description: Environment name that holds deploy secrets
        required: false
        default: prod
        type: string
      deploy_command:
        description: Command used to deploy to TestFlight
        required: false
        default: bundle exec fastlane ios testflight
        type: string

jobs:
  deploy:
    name: deploy-testflight
    runs-on: macos-26
    timeout-minutes: 30
    environment: ${{ inputs.environment_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.checkout_ref || github.ref }}

      - name: Select latest Xcode
        shell: bash
        run: |
          set -euo pipefail
          latest_xcode="$(ls -1d /Applications/Xcode*.app | sort -V | tail -n 1)"
          echo "Selecting ${latest_xcode}"
          sudo xcode-select -s "${latest_xcode}/Contents/Developer"
          xcodebuild -version

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Validate deploy prerequisites
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f "fastlane/Fastfile" ]; then
            echo "::error::fastlane/Fastfile not found. Configure fastlane lanes before release deploy."
            exit 1
          fi

      - name: Select latest Xcode available
        shell: bash
        run: |
          set -euo pipefail
          latest=""
          if compgen -G "/Applications/Xcode_*.app" > /dev/null; then
            latest=$(ls -1d /Applications/Xcode_*.app | sort -V | tail -n1)
          elif [ -d "/Applications/Xcode.app" ]; then
            latest="/Applications/Xcode.app"
          fi

          if [ -z "$latest" ]; then
            echo "::error::No Xcode installation found on runner"
            exit 1
          fi

          sudo xcode-select -s "$latest/Contents/Developer"
          xcodebuild -version

      - name: Deploy to TestFlight
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          FASTLANE_SESSION: ${{ secrets.FASTLANE_SESSION }}
          CI_XCODE_WORKSPACE: ${{ vars.CI_XCODE_WORKSPACE }}
          CI_XCODE_PROJECT: ${{ vars.CI_XCODE_PROJECT }}
          CI_XCODE_SCHEME: ${{ vars.CI_XCODE_SCHEME }}
          CI_APP_IDENTIFIER: ${{ vars.CI_APP_IDENTIFIER }}
          MATCH_GIT_URL: ${{ vars.MATCH_GIT_URL }}
          MATCH_READONLY: ${{ vars.MATCH_READONLY }}
        run: ${{ inputs.deploy_command }}
